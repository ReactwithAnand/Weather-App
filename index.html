<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather-forcast</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter city name" spellcheck="false">
            <button><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                    class="bi bi-search-heart" viewBox="0 0 16 16">
                    <path d="M6.5 4.482c1.664-1.673 5.825 1.254 0 5.018-5.825-3.764-1.664-6.69 0-5.018" />
                    <path
                        d="M13 6.5a6.47 6.47 0 0 1-1.258 3.844q.06.044.115.098l3.85 3.85a1 1 0 0 1-1.414 1.415l-3.85-3.85a1 1 0 0 1-.1-.115h.002A6.5 6.5 0 1 1 13 6.5M6.5 12a5.5 5.5 0 1 0 0-11 5.5 5.5 0 0 0 0 11" />
                </svg></button>
        </div>
            <div class="error">
                <p>Invalid city name</p>
            </div>

        <div class="weather">
            <img src="images/rain.png" class="weather-icon">
            <h1 class="temp">25°C</h1>
            <h2 class="city">katihar</h2>
            <div class="details">
                <div class="col">
                    <img src="images/humidity.png">
                    <div>
                        <p class="humidity">50%</p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="images/wind.png">
                    <div>
                        <p class="wind">5 km/h</p>
                        <p>Wind Speed</p>
                    </div>
                </div>

            </div>
        </div>
    </div>


    <script>
        const apiKey = "df23348db36b4ecfad3f37714712a612";
        const apiUrl = "https://api.openweathermap.org/data/2.5/weather?&units=metric&q=";

        const searchBox = document.querySelector(".search input");
        const searchBtn = document.querySelector(".search button");
        const weatherIcon = document.querySelector(".weather-icon");

        async function checkWeather(city) {
            const response = await fetch(apiUrl + city + `&appid=${apiKey}`);
            var data = await response.json();
            console.log(data.weather[0].main);

            document.querySelector(".city").innerText = data.name;
            document.querySelector(".temp").innerText = Math.round(data.main.temp) + "°C";
            document.querySelector(".humidity").innerText = data.main.humidity + "%";
            document.querySelector(".wind").innerText = data.wind.speed + "km/h";

            if(data.weather[0].main.toLowerCase() == "clouds"){
                weatherIcon.src = "images/clouds.png";
            }
            else if(data.weather[0].main.toLowerCase() == "clear"){
                weatherIcon.src = "images/clear.png";
            }
            else if(data.weather[0].main.toLowerCase() == "rain"){
                weatherIcon.src = "images/rain.png";
            }
            else if(data.weather[0].main.toLowerCase() == "drizzle"){
                weatherIcon.src = "images/drizzle.png";
            }
            else if(data.weather[0].main.toLowerCase() == "mist"){
                weatherIcon.src = "images/mist.png";
            }
            else if(data.weather[0].main.toLowerCase() == "snow"){
                weatherIcon.src = "images/snow.png";
            }

            document.querySelector(".weather").style.display = "block";
        }

        searchBtn.addEventListener("click", () => {
            checkWeather(searchBox.value);
        });
    </script>

</body>

</html>
